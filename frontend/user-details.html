<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Confirmation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/glassmorphism.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Apply theme immediately to prevent flicker
        (function() {
            const savedTheme = localStorage.getItem('user-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            // Set initial poster logo
            const darkLogo = "https://dsvv.s3.ap-south-1.amazonaws.com/uploads/2023/03/DSVV_LOGO_PNG.png";
            const lightLogo = "https://www.addressguru.in/images/1801593532.png";
            
            window.addEventListener('DOMContentLoaded', () => {
                const logo = document.getElementById('posterLogo');
                if (logo) logo.src = savedTheme === 'light' ? lightLogo : darkLogo;
            });
        })();
    </script>
    <style>
        :root {
            --bg-deep-blue: #0b1121;
            --bg-panel: #151f38;
            --bg-card: #1c2645;
            --neon-cyan: #06b6d4;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.05);
            --poster-bg: #0a1128;
            --poster-text: #ffffff;
            --poster-label: #64748b;
        }

        [data-theme="light"] {
            --bg-deep-blue: #f1f5f9;
            --bg-panel: #ffffff;
            --bg-card: #ffffff;
            --neon-cyan: #0891b2;
            --text-primary: #1e3a8a;
            --text-secondary: #64748b;
            --glass-border: rgba(0, 0, 0, 0.1);
            --poster-bg: #ffffff;
            --poster-text: #1e3a8a;
            --poster-label: #64748b;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg-deep-blue);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }
        .split-layout {
            display: flex;
            width: 100%;
            height: 100vh;
        }
        .left-panel, .right-panel {
            padding: 2rem;
            overflow-y: auto;
        }
        .left-panel {
            flex: 6;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .right-panel {
            flex: 4;
            background: radial-gradient(circle at center, var(--bg-panel) 0%, var(--bg-deep-blue) 100%);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 50px 0 100px rgba(0,0,0,0.05);
        }
        
        /* Premium Glow behind the poster */
        .right-panel::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.3) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }
        .glass-card {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .readonly-field {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            cursor: not-allowed;
            border-radius: 8px;
            padding: 0.8rem;
            width: 100%;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .event-details h3 {
            color: var(--neon-cyan);
            margin-bottom: 1rem;
            font-size: 1.8rem;
            font-weight: 800;
        }
        .event-details p {
            margin-bottom: 0.8rem;
            color: var(--text-secondary);
        }
        .event-details span.label {
            font-weight: 600;
            color: var(--text-primary);
        }
        /* Button unification - using global styles */

        /* --- POSTER STYLES --- */
        .poster-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 90%;
            background: var(--poster-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            padding: 3.5rem 3rem;
            text-align: center;
            overflow: hidden;
            box-sizing: border-box;
            border-radius: 8px;
        }

        .corner-bracket {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 6px solid #e2e8f0;
            z-index: 5;
            pointer-events: none;
        }
        .cb-tl { top: 25px; left: 25px; border-right: none; border-bottom: none; border-top-left-radius: 25px; }
        .cb-tr { top: 25px; right: 25px; border-left: none; border-bottom: none; border-top-right-radius: 25px; }
        .cb-bl { bottom: 25px; left: 25px; border-right: none; border-top: none; border-bottom-left-radius: 25px; }
        .cb-br { bottom: 25px; right: 25px; border-left: none; border-top: none; border-bottom-right-radius: 25px; }

        .side-line {
            position: absolute;
            top: 100px;
            bottom: 100px;
            width: 1px;
            background: rgba(255, 255, 255, 0.15);
            z-index: 2;
        }
        .line-left { left: 35px; }
        .line-right { right: 35px; }

        .poster-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            align-items: center;
            width: 100%;
        }

        .poster-title {
            font-family: 'Times New Roman', serif;
            font-size: 4.5rem;
            background: linear-gradient(to bottom, #fde68a 0%, #d4af37 50%, #78350f 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            font-weight: bold;
            font-style: italic;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
        }

        .poster-milan {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .date-container {
            margin-bottom: 2rem;
            display: inline-block;
        }
        .poster-date {
            font-size: 1.5rem;
            color: var(--poster-text);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .poster-desc {
            font-size: 1.1rem;
            color: var(--poster-text);
            line-height: 1.6;
            margin-bottom: 2rem;
            padding: 0 2rem;
            font-family: 'Inter', sans-serif;
            white-space: pre-wrap;
            text-align: center;
            max-height: 150px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .poster-info-label {
            font-size: 0.85rem;
            color: var(--poster-label);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
        }

        .poster-info-value {
            font-weight: 800;
            color: var(--poster-text);
            font-size: 1.25rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        /* Theme Toggle Styling */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 1000;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--neon-cyan);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--neon-cyan);
            color: white;
        }

        /* Success Modal Styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .success-modal {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalPop { to { transform: scale(1); } }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .success-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
        }

        .success-msg {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        [data-theme="light"] .success-modal {
            background: white;
            border-color: rgba(0, 0, 0, 0.05);
        }
        [data-theme="light"] .success-title { color: #1e3a8a; }

        /* Responsive Styles */
        @media (max-width: 1024px) {
            .split-layout {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .left-panel {
                width: 100%;
                padding: 2rem 1.5rem;
                display: block; /* overriding flex */
                overflow-y: visible;
            }
            .right-panel {
                width: 100%;
                padding: 2rem 1.5rem;
                display: block;
                overflow-y: visible;
            }
            .poster-card {
                padding: 2rem 1.5rem;
            }
            .poster-title {
                font-size: 3rem;
            }
            .poster-milan {
                font-size: 1rem;
            }
            .poster-desc {
                font-size: 1rem;
                padding: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            .poster-title {
                font-size: 2.2rem;
            }
            .poster-date {
                font-size: 1.2rem;
            }
            .glass-card {
                padding: 2rem 1.5rem;
            }
            form > div[style*="display: flex; gap: 10px; margin-top: 20px;"] {
                flex-direction: column;
            }
            form > div[style*="display: flex; gap: 15px; margin-top: 20px;"] {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle" title="Toggle Theme">
        <svg id="moonIcon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </div>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="success-modal">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="success-title">Submitted Successfully</h2>
            <p class="success-msg">Your registration has been confirmed. You are officially present for the event.</p>
            <button class="btn-gradient" style="width: 100%;" onclick="window.location.href='user.html'">Done</button>
        </div>
    </div>

    <div class="split-layout">
        <div class="left-panel">
            <div class="glass-card">
                <h2>Confirm Details</h2>
                <form id="registrationConfirmForm">
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <div class="input-group" style="flex: 1;">
                            <label>Scholar ID</label>
                            <input type="text" id="studentScholarId" class="readonly-field" readonly>
                        </div>
                        <div class="input-group" style="flex: 2;">
                            <label>Name</label>
                            <input type="text" id="studentName" class="readonly-field" readonly>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <div class="input-group" style="flex: 1;">
                            <label>Mobile</label>
                            <input type="text" id="studentMobile" class="readonly-field" readonly>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Email</label>
                            <input type="text" id="studentEmail" class="readonly-field" readonly>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <div class="input-group" style="flex: 1;">
                            <label>Course</label>
                            <input type="text" id="studentCourse" class="readonly-field" readonly>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Semester</label>
                            <input type="text" id="studentSemester" class="readonly-field" readonly>
                        </div>
                    </div>
                    
                    <div style="margin: 20px 0; display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="interestedCheck" style="width: 20px; height: 20px; cursor: pointer;">
                        <label for="interestedCheck" style="color: var(--text-primary); font-weight: 600; cursor: pointer;">I am Interested</label>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-gradient" disabled style="opacity: 0.5; cursor: not-allowed; width: 100%; padding: 12px;">Finalize Registration</button>
                    <div id="statusMsg" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
                </form>
            </div>
        </div>

        <div class="right-panel">
            <div class="poster-wrapper" id="eventPoster">
                <div class="corner-bracket cb-tl"></div>
                <div class="corner-bracket cb-tr"></div>
                <div class="corner-bracket cb-bl"></div>
                <div class="corner-bracket cb-br"></div>
                <div class="side-line line-left"></div>
                <div class="side-line line-right"></div>

                <div class="poster-content">
                    <div style="margin-bottom: 2rem; text-align: center;">
                        <img id="posterLogo" src="https://dsvv.s3.ap-south-1.amazonaws.com/uploads/2023/03/DSVV_LOGO_PNG.png" alt="DSVV Logo" style="width: 260px; height: auto; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));">
                    </div>
                    
                    <h3 id="panelEventTitle" class="poster-title" style="font-size: 3.5rem;">Event Title</h3>
                    <div id="panelOrganizer" class="poster-milan">Organizer Name</div>
                    
                    <div class="date-container">
                        <p id="panelDate" class="poster-date">DD/MM/YYYY</p>
                    </div>

                    <div class="poster-desc" id="panelDesc">Dynamic event description will appear here.</div>

                    <div style="margin-top: auto; padding-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                        <div style="border-right: 1px solid rgba(255,255,255,0.1); padding: 1rem;">
                            <p class="poster-info-label" style="margin-bottom: 0.3rem;">VENUE</p>
                            <p id="panelVenue" class="poster-info-value" style="margin-bottom: 0;">Venue Name</p>
                        </div>
                        <div style="padding: 1rem;">
                            <p class="poster-info-label" style="margin-bottom: 0.3rem;">TIME</p>
                            <p id="panelTime" class="poster-info-value" style="margin-bottom: 0;">10:00 AM</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/user-details.js"></script>
    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('user-theme', newTheme);
            
            // Swap Poster Logo
            const logo = document.getElementById('posterLogo');
            const darkLogo = "https://dsvv.s3.ap-south-1.amazonaws.com/uploads/2023/03/DSVV_LOGO_PNG.png";
            const lightLogo = "https://www.addressguru.in/images/1801593532.png";
            if (logo) logo.src = newTheme === 'light' ? lightLogo : darkLogo;
        });
    </script>
</body>
</html>
