<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/glassmorphism.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body style="display: flex; align-items: center; justify-content: center; padding: 2rem;">

    <div class="bg-layer"></div>
    <div class="particles"></div>

    <div class="glass-card" style="max-width: 500px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div class="glass-logo" style="width: 80px; height: 80px; margin: 0 auto 1rem auto; font-size: 1rem;">NEXUS</div>
            <h2 style="color: var(--neon-cyan);">Event Registration</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Secure Direct-to-Sheet Protocol</p>
        </div>

        <form id="regForm">
            <div class="input-group">
                <input type="text" id="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="tel" id="phone" placeholder="Phone Number" required>
            </div>
            <div class="input-group">
                <input type="text" id="college" placeholder="College / Organization" required>
            </div>
            
            <button type="submit" class="btn-glow" id="submitBtn">Confirm Registration</button>
        </form>

        <div id="successMessage" style="display: none; margin-top: 2rem; text-align: center; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
            <h3 style="color: #22c55e;">✅ Registration Successful</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">Your ID:</p>
            <div id="regIdDisplay" style="font-family: monospace; font-size: 1.5rem; color: var(--neon-yellow); margin-top: 0.5rem;">...</div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const adminId = urlParams.get('adminId');

        if (!adminId) {
            document.body.innerHTML = '<h2 style="color:red; text-align:center;">Error: Missing Event ID in URL</h2>';
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Processing...';

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                college: document.getElementById('college').value,
            };

            try {
                const res = await fetch(`/api/events/register/${adminId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('regForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('regIdDisplay').innerText = data.registrationId;
                } else {
                    alert('Error: ' + (data.error || 'Failed to register'));
                    btn.disabled = false;
                    btn.innerText = 'Confirm Registration';
                }

            } catch (error) {
                alert('Connection error.');
                btn.disabled = false;
                btn.innerText = 'Confirm Registration';
            }
        });
    </script>
</body>
</html>
